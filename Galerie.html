<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Galerie – Julia Nails &amp; Beauty</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" id="silktide-consent-manager-css" href="css/silktide-consent-manager.css">
</head>
<body class="gallerie-seite">
<header id="main-header"></header>

<main id="main-content">
    <section class="main-content-galerie">
        <h2>Galerie</h2>
        <div class="bilder">
            <!-- Thumbnails mit Lazy Loading -->
            <img src="images/thumbnails/wimpern_thumb.jpg"
                 data-fullsize="images/fullsize/wimpern_full.jpg"
                 alt="Beispiel Nageldesign 1"
                 loading="lazy"
                 class="lazy-image">
            <img src="images/thumbnails/unnamed-2_thumb.jpg"
                 data-fullsize="images/fullsize/unnamed-2_full.jpg"
                 alt="Beispiel Nageldesign 2"
                 loading="lazy"
                 class="lazy-image">
            <img src="images/thumbnails/unnamed_thumb.jpg"
                 data-fullsize="images/fullsize/unnamed_full.jpg"
                 alt="Beispiel Nageldesign 3"
                 loading="lazy"
                 class="lazy-image">
            <img src="images/thumbnails/unnamed-3_thumb.jpg"
                 data-fullsize="images/fullsize/unnamed-3_full.jpg"
                 alt="Beispiel Nageldesign 4"
                 loading="lazy"
                 class="lazy-image">
            <img src="images/thumbnails/unnamed-4_thumb.jpg"
                 data-fullsize="images/fullsize/unnamed-4_full.jpg"
                 alt="Beispiel Nageldesign 5"
                 loading="lazy"
                 class="lazy-image">
            <img src="images/thumbnails/unnamed-5_thumb.jpg"
                 data-fullsize="images/fullsize/unnamed-5_full.jpg"
                 alt="Beispiel Nageldesign 6"
                 loading="lazy"
                 class="lazy-image">
            <img src="images/thumbnails/zuLöschen.jpg"
                 data-fullsize="images/fullsize/unnamed-6_full.jpg"
                 alt="Beispiel Nageldesign 7"
                 loading="lazy"
                 class="lazy-image">
            <img src="images/thumbnails/unnamed-7_thumb.jpg"
                 data-fullsize="images/fullsize/unnamed-7_full.jpg"
                 alt="Beispiel Nageldesign 8"
                 loading="lazy"
                 class="lazy-image">
            <img src="images/thumbnails/unnamed-8_thumb.jpg"
                 data-fullsize="images/fullsize/unnamed-8_full.jpg"
                 alt="Beispiel Nageldesign 9"
                 loading="lazy"
                 class="lazy-image">
        </div>

        <button class="mehr-button" id="mehrBilderBtn">Mehr Bilder laden</button>
    </section>
</main>

<!-- Lightbox -->
<div id="lightbox" class="lightbox">
    <button class="lightbox-close">&times;</button>
    <button class="lightbox-nav lightbox-prev">&#10094;</button>
    <button class="lightbox-nav lightbox-next">&#10095;</button>
    <div class="lightbox-content">
        <img class="lightbox-img" src="" alt="">
        <video class="lightbox-video" controls playsinline></video>
        <div class="lightbox-loading">Bild lädt...</div>
    </div>
</div>

<footer>
    <div class="datenschutz">
        <div class="footer-row">
            <p class="social-media">
                <a href="https://www.instagram.com/_julia_nails_beauty?igsh=MWx6YXVlemE0eDBsdA%3D%3D&utm_source=qr" target="_blank"><img src="images/icons/Instagram_logo_2016.svg" alt="Instagram Logo"></a>
                <a href="https://www.facebook.com/share/1BDZTJkEBH/?mibextid=wwXIfr" target="_blank"><img src="images/icons/Facebook_icon.svg" alt="Facebook logo"></a>
                <a href="https://www.tiktok.com/@julianailsbeauty?_r=1&_t=ZG-96xfev7Afrd" target="_blank"><img src="images/icons/Tiktok_icon.svg" alt="TikTok logo"></a>
            </p>
            <p class="footer-info">
                © Julia Nails &amp; Beauty |
                <a href="impressum.html">Impressum</a> |
                <a href="impressum.html#datenschutz">Datenschutz</a>
            </p>
        </div>
    </div>
</footer>

<!-- SCRIPTS -->
<script src="js/silktide-consent-manager.js"></script>

<script src="js/nav.js" defer></script>
<script src="js/galerie.js" defer></script>
</body>
</html>
